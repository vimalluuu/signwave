<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button
        (click)="switchToDesktop.emit()"
        color="medium"
        [attr.aria-label]="'translate.desktopView' | transloco">
        <ion-icon name="desktop-outline" slot="icon-only" />
      </ion-button>
    </ion-buttons>
    <app-language-selectors />
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  @if (spokenToSigned) {
    <app-signed-language-output />
  } @else {
    <app-video [displayControls]="false" [displayFps]="false" />
  }
</ion-content>

<!-- Footer with input and submit button -->
<ion-footer [class.signed-to-spoken]="!spokenToSigned">
  @if (spokenToSigned) {
    <app-spoken-language-input [isMobile]="true" />
  } @else {
    <app-signed-language-input />
  }
</ion-footer>
